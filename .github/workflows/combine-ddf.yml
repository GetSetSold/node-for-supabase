# .github/workflows/ddf-sync.yml
name: DDF Sync

on:
  schedule:
    - cron: '30 */4 * * *'  # every 4 hours at :30
  workflow_dispatch:

jobs:
  sync-property:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run property sync
        run: node fetch-property.js
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DDF_CLIENT_ID: ${{ secrets.DDF_CLIENT_ID }}
          DDF_CLIENT_SECRET: ${{ secrets.DDF_CLIENT_SECRET }}

  sync-grid:
    runs-on: ubuntu-latest
    environment: production
    needs: sync-property        # ✅ waits for property to fully finish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run grid sync
        run: node fetch-grid.js
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
