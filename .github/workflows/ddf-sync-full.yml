name: DDF Full Daily Sync

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM EST / 10 AM EDT
  workflow_dispatch:
  workflow_run:
    workflows: ['DDF Incremental Sync']
    types: [completed]
    branches: [main]
    # Only trigger at certain hours to avoid runaway chains

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run full DDF sync with deletion check
        run: node ddf-sync.js
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FULL_SYNC: 'true'
