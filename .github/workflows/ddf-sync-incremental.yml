name: DDF Incremental Sync
on:
  schedule:
    - cron: '0 11,16,21,1 * * *'  # 7am, 12pm, 5pm, 9pm EDT (UTC-4)
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run incremental DDF sync
        run: node ddf-sync.js
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FULL_SYNC: 'false'
